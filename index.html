<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão PRO - Oficial</title>
    
    <!-- TENTATIVA 1: Carregamento Direto (CDN Principal) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        :root { --ativo: #28a745; --pendente: #ffc107; --suspenso: #dc3545; --gray: #6c757d; --bg: #f4f6f9; --novo: #007bff; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; border-top: 8px solid var(--gray); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card.is-new { border-top-color: var(--novo) !important; background-color: #f0f7ff; border-left: 5px solid var(--novo); }
        .btn { border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .grid-ficha { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        details { background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
        summary { padding: 12px; cursor: pointer; font-weight: bold; background: #4b6584; color: white; border-radius: 6px; display: flex; justify-content: space-between; list-style: none; }
        .menu-especial summary { background: #6c5ce7; }
        .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer; margin-top: 4px; }
        .dot-pendente { background: var(--suspenso); }
        .dot-ok { background: var(--ativo); }
        .hidden { display: none; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin: 5px; width: 180px; }
        #status-box { padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-box" style="background: #fff3cd; color: #856404;">⏳ INICIALIZANDO SISTEMA...</div>

    <div id="tela-lista">
        <div class="panel">
            <h2 style="margin:0 0 15px 0">Novo Cliente</h2>
            <div style="display:flex; flex-wrap:wrap; gap:5px">
                <input type="text" id="rs" placeholder="Razão Social">
                <input type="text" id="cnpj" placeholder="CNPJ">
                <button class="btn" style="background:var(--ativo)" onclick="novoCliente()">CADASTRAR</button>
            </div>
        </div>
        <div id="lista-clientes"></div>
    </div>

    <div id="tela-ficha" class="hidden">
        <button class="btn" style="background:var(--gray); margin-bottom:15px" onclick="location.reload()">← VOLTAR</button>
        <div id="ficha-container"></div>
    </div>
</div>

<!-- TENTATIVA 2: Carregamento de Backup (Se o primeiro falhar) -->
<script>
if (typeof firebase === 'undefined') {
    console.log("Tentando servidor de backup...");
    document.write('<script src="https://cdn.jsdelivr.net"><\/script>');
    document.write('<script src="https://cdn.jsdelivr.net"><\/script>');
}
</script>

<script>
window.onload = function() {
    const firebaseConfig = {
        apiKey: "AIzaSyBUU5U5upiAqZfLb8ecuSMEcvkoboXe6rk",
        authDomain: "gestaooficial-f1527.firebaseapp.com",
        databaseURL: "https://gestaooficial-f1527-default-rtdb.firebaseio.com",
        projectId: "gestaooficial-f1527",
        storageBucket: "gestaooficial-f1527.appspot.com",
        messagingSenderId: "1060376090119",
        appId: "1:1060376090119:web:3a1b38e7c57a6f0eb53ca2"
    };

    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            // Monitor de conexão
            db.ref(".info/connected").on("value", (snap) => {
                const box = document.getElementById('status-box');
                if (snap.val() === true) {
                    box.innerHTML = "✅ SISTEMA ONLINE";
                    box.style.background = "#d4edda";
                    box.style.color = "#155724";
                } else {
                    box.innerHTML = "⚠️ TENTANDO CONEXÃO...";
                    box.style.background = "#fff3cd";
                }
            });

            // Lógica de Listagem
            db.ref('clientes').on('value', (snap) => {
                const cont = document.getElementById('lista-clientes');
                cont.innerHTML = '';
                const data = snap.val();
                if(!data) {
                    cont.innerHTML = "<div class='panel'>Nenhum cliente cadastrado.</div>";
                    return;
                }
                Object.keys(data).forEach(id => {
                    const c = data[id];
                    const card = document.createElement('div');
                    card.className = `card ${c.lido === false ? 'is-new' : ''}`;
                    card.innerHTML = `<div><b>${c.rs}</b><br><small>CNPJ: ${c.cnpj || ''}</small></div>
                                      <button class="btn" style="background:var(--dark)" onclick="abrirFicha('${id}')">ABRIR</button>`;
                    cont.appendChild(card);
                });
            });

            // Funções globais
            window.novoCliente = function() {
                const rs = document.getElementById('rs').value;
                const cnpj = document.getElementById('cnpj').value;
                if(!rs) return alert("Digite a Razão Social!");
                db.ref('clientes/' + Date.now()).set({ rs, cnpj, lido: false, status: 'ativo' });
                document.getElementById('rs').value = '';
            };

            window.abrirFicha = function(id) {
                db.ref('clientes/' + id).update({ lido: true });
                document.getElementById('tela-lista').classList.add('hidden');
                document.getElementById('tela-ficha').classList.remove('hidden');

                db.ref('clientes/' + id).on('value', (snap) => {
                    const c = snap.val();
                    const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
                    const anos =;
                    
                    const geraMeses = (tip, ano) => meses.map(m => {
                        const st = (c.dots && c.dots[tip] && c.dots[tip][ano] && c.dots[tip][ano][m]) || 'pendente';
                        return `<div class="month-item">${m}<button class="dot dot-${st}" onclick="toggleDot('${id}','${tip}','${ano}','${m}','${st}')"></button></div>`;
                    }).join('');

                    const geraMenu = (tit, tip, cl='') => `
                        <details class="${cl}"><summary>${tit}</summary>
                            <div style="padding:10px">${anos.map(a => `<details><summary style="color:#333;font-size:11px">${a}</summary><div class="month-grid">${geraMeses(tip,a)}</div></details>`).join('')}</div>
                        </details>`;

                    document.getElementById('ficha-container').innerHTML = `
                        <div class="panel"><h1>${c.rs}</h1></div>
                        <div class="grid-ficha">
                            <div>${geraMenu('📅 COLETA','col')}${geraMenu('📺 TVpA','tv')}${geraMenu('☎️ STFC','stfc')}</div>
                            <div>${geraMenu('📊 DICI','dici','menu-especial')}${geraMenu('📡 N_TVpA','n_tv','menu-especial')}${geraMenu('📞 N_STFC','n_stfc','menu-especial')}</div>
                            <div>${geraMenu('💰 ECONÔMICA','eco','menu-especial')}${geraMenu('🏗️ INFRA','infra','menu-especial')}</div>
                        </div>`;
                });
            };

            window.toggleDot = function(id, tip, ano, m, st) {
                db.ref(`clientes/${id}/dots/${tip}/${ano}/${m}`).set(st === 'pendente' ? 'ok' : 'pendente');
            };

        } else {
            document.getElementById('status-box').innerHTML = "❌ BLOQUEIO DE SCRIPT: Tente abrir o site no navegador do celular (4G) para testar.";
        }
    } catch (e) {
        document.getElementById('status-box').innerHTML = "❌ ERRO CRÍTICO: " + e.message;
    }
};
</script>
</body>
</html>
