<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes - Dashboard</title>
    <!-- Versão de segurança do Firebase -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        :root { --ativo: #28a745; --pendente: #ffc107; --suspenso: #dc3545; --gray: #6c757d; --bg: #f4f6f9; --novo: #007bff; --dark: #2c3e50; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-top: 8px solid var(--gray); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card.is-new { border-top-color: var(--novo) !important; background-color: #f0f7ff; border-left: 5px solid var(--novo); }
        .btn { border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .grid-ficha { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        details { background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; }
        summary { padding: 12px; cursor: pointer; font-weight: bold; background: #4b6584; color: white; border-radius: 6px; display: flex; justify-content: space-between; }
        .menu-especial summary { background: #6c5ce7; }
        .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .month-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer; margin-top: 4px; }
        .dot-pendente { background: var(--suspenso); }
        .dot-ok { background: var(--ativo); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA DA LISTA -->
    <div id="tela-lista">
        <div class="panel">
            <h2>Novo Cliente</h2>
            <input type="text" id="rs" placeholder="Razão Social" style="padding:10px; width:200px">
            <input type="text" id="cnpj" placeholder="CNPJ" style="padding:10px; width:150px">
            <button class="btn" style="background:var(--ativo); color:white" onclick="novoCliente()">Cadastrar</button>
        </div>
        <div id="lista-container">Carregando dados...</div>
    </div>

    <!-- TELA DA FICHA -->
    <div id="tela-ficha" class="hidden">
        <button class="btn" style="background:var(--gray); color:white" onclick="location.reload()">← Voltar</button>
        <div id="ficha-container"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBUU5U5upiAqZfLb8ecuSMEcvkoboXe6rk",
    authDomain: "gestaoclientesequipe.firebaseapp.com",
    databaseURL: "https://gestaoclientesequipe-default-rtdb.firebaseio.com",
    projectId: "gestaoclientesequipe",
    storageBucket: "gestaoclientesequipe.firebasestorage.app",
    messagingSenderId: "1060376090119",
    appId: "1:1060376090119:web:3a1b38e7c57a6f0eb53ca2"
};

// Inicialização Direta
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
const anos =;

// Atualizar Lista
db.ref('clientes').on('value', (snap) => {
    const cont = document.getElementById('lista-container');
    cont.innerHTML = '';
    const data = snap.val();
    if (!data) return cont.innerHTML = "Nenhum cliente.";
    
    Object.keys(data).forEach(id => {
        const c = data[id];
        const card = document.createElement('div');
        card.className = `card ${c.lido === false ? 'is-new' : ''}`;
        card.innerHTML = `<div><b>${c.rs}</b><br><small>${c.cnpj}</small></div>
                          <button class="btn" style="background:var(--dark);color:white" onclick="abrirFicha('${id}')">ABRIR</button>`;
        cont.appendChild(card);
    });
});

function novoCliente() {
    const rs = document.getElementById('rs').value;
    const cnpj = document.getElementById('cnpj').value;
    if(!rs) return;
    db.ref('clientes/' + Date.now()).set({ rs, cnpj, lido: false });
}

function abrirFicha(id) {
    db.ref('clientes/' + id).update({ lido: true });
    document.getElementById('tela-lista').classList.add('hidden');
    document.getElementById('tela-ficha').classList.remove('hidden');

    db.ref('clientes/' + id).on('value', (snap) => {
        const c = snap.val();
        const geraMeses = (tip, ano) => meses.map(m => {
            const st = (c.dots && c.dots[tip] && c.dots[tip][ano] && c.dots[tip][ano][m]) || 'pendente';
            return `<div class="month-item">${m}<button class="dot dot-${st}" onclick="toggleDot('${id}','${tip}','${ano}','${m}','${st}')"></button></div>`;
        }).join('');

        const geraMenu = (tit, tip, cl='') => `
            <details class="${cl}"><summary>${tit}</summary>
                <div style="padding:10px">${anos.map(a => `<details><summary style="color:#333">${a}</summary><div class="month-grid">${geraMeses(tip,a)}</div></details>`).join('')}</div>
            </details>`;

        document.getElementById('ficha-container').innerHTML = `
            <div class="panel"><h1>${c.rs}</h1></div>
            <div class="grid-ficha">
                <div>${geraMenu('📅 COLETA','col')}${geraMenu('📺 TVpA','tv')}${geraMenu('☎️ STFC','stfc')}</div>
                <div>${geraMenu('📊 DICI','dici','menu-especial')}${geraMenu('📡 NOVA TVpA','n_tv','menu-especial')}${geraMenu('📞 NOVA STFC','n_stfc','menu-especial')}</div>
                <div>${geraMenu('💰 ECONÔMICA','eco','menu-especial')}${geraMenu('🏗️ INFRA','infra','menu-especial')}</div>
            </div>`;
    });
}

function toggleDot(id, tip, ano, m, st) {
    db.ref(`clientes/${id}/dots/${tip}/${ano}/${m}`).set(st === 'pendente' ? 'ok' : 'pendente');
}
</script>
</body>
</html>
